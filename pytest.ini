[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    phase2: Phase 2 — session storage (skipped until implemented)
    phase3: Phase 3 — three profiles + wait bar (skipped until implemented)
    phase4: Phase 4 — startup picker (skipped until implemented)
    phase5: Phase 5 — yolo learning (skipped until implemented)
    phase6: Phase 6 — agent + LLM summarizer (skipped until implemented)
    phase7: Phase 7 — Telegram bridge (skipped until implemented)
    integration: integration tests (slower, may hit real subprocess)
filterwarnings =
    ignore::DeprecationWarning
