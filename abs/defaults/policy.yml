active_profile: auto-approve

# --- Detection (how abs recognizes the *type* of prompt Claude is asking) ---
detection:
  approval_yn_patterns:
    - "\\(y/n\\)"
    - "\\? \\[Y/n\\]"
    - "\\? \\[y/N\\]"
    - "Do you want to proceed\\?"
  approval_menu_patterns:
    - "❯.*Yes"
    - "1\\.\\s*Yes.*2\\.\\s*No"
  text_input_patterns:
    - "^>\\s*$"
    - "Type your message"
  completion_patterns:
    # Older / explicit signals (still match if present)
    - "✓ Done"
    - "Task complete"
    - "All tasks completed"
    # Real Claude Code idle signals — these appear at the bottom of the
    # pane once Claude finishes the current turn and is awaiting the
    # next user input. The "✻ <verb> for <time>" line is Claude's
    # post-task self-report:
    #   - verb rotates randomly (Cogitated, Cooked, Baked, Crunched,
    #     Churned, Pondered, Mused, Worked, Sautéed, …) — we use \\S+
    #     so accented letters survive a non-Unicode locale.
    #   - time can be "1s", "4.5s", "3m", "3m 5s", "1h 2m", "1h 30m 5s".
    - "✻\\s+\\S+\\s+for\\s+(?:\\d+(?:\\.\\d+)?\\s*[smhd]\\s*)+"
    - "\\? for shortcuts"      # bottom hint, only present when idle
  running_patterns:
    - "esc to interrupt"
    - "Thinking\\.\\.\\."
    - "⏺.*Running"

# --- Destructive ops (always bypass the wait bar; pend until you reply) -----
# Applied to extracted_command + raw_text + context. Case-insensitive regex.
destructive_patterns:
  - "\\brm\\s+-rf?\\b"
  - "\\brm\\s+(-[a-zA-Z]+\\s+)*/"
  - "\\brmdir\\b"
  - "\\bunlink\\b"
  - "\\bsudo\\b"
  - "DROP\\s+TABLE"
  - "DROP\\s+DATABASE"
  - "TRUNCATE"
  - "git\\s+reset\\s+--hard"
  - "git\\s+push\\s+--force"
  - "git\\s+push\\s+-f\\b"
  - "git\\s+clean\\s+-[fd]"
  - "chmod\\s+777"
  - "chown\\s+-R"
  - ":\\(\\)\\{\\s*:\\|:&\\s*\\};:"   # fork bomb
  - "mkfs\\."
  - "dd\\s+if="

# --- Profiles ---------------------------------------------------------------
profiles:

  # Default. Auto-approves routine work after a 2s wait-bar (any keystroke
  # cancels). Destructive ops bypass the bar and wait indefinitely.
  auto-approve:
    wait_interval_seconds: 2.0
    auto_approve:
      - "."                  # anything not destructive → auto-yes after bar
    auto_deny: []
    escalate_to_telegram: []
    default_action: auto_yes

  # Same auto-yes as auto-approve, but stores patterns the first time you
  # approve them so we can replay. Wait-bar still applies on learned items.
  # (Learning logic lands in Phase 5; the profile itself works today.)
  yolo:
    wait_interval_seconds: 2.0
    auto_approve:
      - "."
    auto_deny: []
    escalate_to_telegram: []
    default_action: auto_yes

  # No auto-decisions at all — every approval pends until you reply
  # (terminal or, in Phase 7, Telegram).
  restricted:
    wait_interval_seconds: 0
    auto_approve: []
    auto_deny: []
    escalate_to_telegram:
      - "."
    default_action: escalate_telegram

  # Phase 1 legacy — fine-grained allow/deny rules. Kept for users who
  # prefer the explicit pattern style over the "approve everything safe"
  # auto-approve profile.
  default:
    wait_interval_seconds: 0
    auto_approve:
      - "^Read file"
      - "^List directory"
      - "Read\\("
      - "Glob\\("
      - "Grep\\("
      - "LS\\("
      - "Run: (ls|cat|pwd|echo|grep|find|head|tail|wc)\\b"
      - "Bash\\((ls|cat|pwd|echo|grep|find|head|tail|wc|which|env|date|whoami)\\b"
    auto_deny:
      - "rm\\s+-rf"
      - "\\bsudo\\b"
      - "chmod\\s+777"
      - "DROP\\s+TABLE"
      - "git\\s+push\\s+--force"
      - ":\\(\\)\\{\\s*:\\|:&\\s*\\};:"
    escalate_to_telegram:
      - "^Run: npm install"
      - "^Run: git push"
      - "^Edit file"
      - "^Create file"
      - "Write\\("
      - "Edit\\("
      - "Bash\\("
    default_action: escalate_telegram

  paranoid:
    wait_interval_seconds: 0
    auto_approve: []
    auto_deny:
      - "\\brm\\b"
      - "\\bsudo\\b"
      - "\\bchmod\\b"
      - "\\bchown\\b"
      - "\\bmv\\b"
      - ">\\s"
    escalate_to_telegram: []
    default_action: escalate_telegram

# --- Telegram (Phase 7) -----------------------------------------------------
telegram:
  enabled: false
  notify_on_completion: true
  approval_timeout_seconds: 600
  timeout_action: auto_no
  allow_manual_injection: true
